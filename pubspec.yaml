name: geoguess_flags
description: A responsive flag guessing game.
publish_to: 'none'
version: 1.2.0+3

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  http: ^1.2.0
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  cupertino_icons: ^1.0.6
  google_fonts: ^6.3.3
  in_app_purchase: ^3.1.13
  flutter_animate: ^4.5.0
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.1
  # Sound & haptics
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#0d1b2e"
    theme_color: "#0d1b2e"
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/sounds/
    - assets/icon/
